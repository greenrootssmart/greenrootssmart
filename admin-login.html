<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login — Green Roots Smart</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--g1:#1a4a24;--g2:#2d7a3a;--g3:#52b043;--g5:#e8f5e2;--cream:#f7f9f2;--dark:#1a2e1a;--light:#7a9a74;--red:#c62828;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--dark);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.bg{position:fixed;inset:0;background:linear-gradient(135deg,#0a1f0f 0%,#1a4a24 50%,#0a1f0f 100%);z-index:0;}
.dots{position:fixed;inset:0;background-image:radial-gradient(rgba(82,176,67,0.15) 1px,transparent 1px);background-size:30px 30px;z-index:0;}
.box{position:relative;z-index:1;background:rgba(255,255,255,0.04);backdrop-filter:blur(20px);border:1px solid rgba(82,176,67,0.2);border-radius:20px;padding:40px;width:100%;max-width:420px;margin:20px;}
.logo{text-align:center;margin-bottom:32px;}
.logo-text{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;color:white;}
.logo-text span{color:var(--g3);}
.logo-sub{font-size:12px;color:var(--light);margin-top:4px;}
.admin-tag{display:inline-block;background:var(--red);color:white;font-size:10px;font-weight:700;padding:3px 12px;border-radius:20px;margin-top:8px;letter-spacing:1px;}
h2{font-size:20px;font-weight:700;color:white;text-align:center;margin-bottom:6px;}
.sub{font-size:13px;color:var(--light);text-align:center;margin-bottom:28px;}
.field{margin-bottom:16px;}
label{display:block;font-size:12px;font-weight:600;color:rgba(255,255,255,0.6);margin-bottom:6px;letter-spacing:0.5px;}
input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(82,176,67,0.2);border-radius:10px;font-size:14px;color:white;font-family:'DM Sans',sans-serif;outline:none;transition:border 0.2s;}
input:focus{border-color:var(--g3);}
input::placeholder{color:rgba(255,255,255,0.25);}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,var(--g2),var(--g3));color:white;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:8px;transition:opacity 0.2s;}
.btn:hover{opacity:0.9;}
.btn:disabled{opacity:0.6;cursor:not-allowed;}
.error{background:rgba(198,40,40,0.15);border:1px solid rgba(198,40,40,0.3);color:#ff6b6b;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
.loading{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.8s linear infinite;margin-right:8px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg)}}
.back-link{text-align:center;margin-top:20px;font-size:13px;color:var(--light);}
.back-link a{color:var(--g3);text-decoration:none;}
</style>
</head>
<body>
<div class="bg"></div>
<div class="dots"></div>
<div class="box">
  <div class="logo">
    <div class="logo-text">Green Roots <span>Smart</span></div>
    <div class="logo-sub">Rooted in Sustainability</div>
    <div class="admin-tag">⚡ ADMIN ACCESS</div>
  </div>
  <h2>Admin Login</h2>
  <p class="sub">Restricted access — authorized personnel only</p>
  <div class="error" id="errorMsg"></div>
  <div class="field">
    <label>ADMIN EMAIL</label>
    <input type="email" id="adminEmail" placeholder="Enter admin email"/>
  </div>
  <div class="field">
    <label>PASSWORD</label>
    <input type="password" id="adminPassword" placeholder="Enter password" onkeydown="if(event.key==='Enter')doLogin()"/>
  </div>
  <button class="btn" id="loginBtn" onclick="doLogin()">🔐 Login to Admin Panel</button>
  <div class="back-link"><a href="/login">← Back to Supplier Login</a></div>
</div>

<script>
const SUPABASE_URL = 'https://qrwhsygcblgbibogiecm.supabase.co';
const SUPABASE_KEY = 'sb_publishable_lBwSxrqJbAV4owK0nQfvXg_Bo2L0OKB';
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function doLogin() {
  const email = document.getElementById('adminEmail').value.trim();
  const password = document.getElementById('adminPassword').value.trim();
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');

  errorMsg.style.display = 'none';

  if (!email || !password) {
    errorMsg.textContent = '⚠️ Please enter email and password!';
    errorMsg.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="loading"></span>Verifying...';

  try {
    const { data, error } = await supabaseClient
      .from('admins')
      .select('*')
      .eq('email', email)
      .eq('password', password)
      .single();

    if (error || !data) {
      errorMsg.textContent = '❌ Invalid email or password!';
      errorMsg.style.display = 'block';
      btn.disabled = false;
      btn.innerHTML = '🔐 Login to Admin Panel';
      return;
    }

    // Save admin session
    localStorage.setItem('grs_admin', JSON.stringify({
      id: data.id,
      name: data.name,
      email: data.email,
      role: data.role
    }));

    window.location.href = '/admin';

  } catch(err) {
    errorMsg.textContent = '❌ Something went wrong. Try again!';
    errorMsg.style.display = 'block';
    btn.disabled = false;
    btn.innerHTML = '🔐 Login to Admin Panel';
  }
}

// If already logged in as admin redirect
if (localStorage.getItem('grs_admin')) {
  window.location.href = '/admin';
}
</script>
</body>
</html>
