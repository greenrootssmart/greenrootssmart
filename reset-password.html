<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="keywords" content="Green Roots Smart password reset"/>
<title>Reset Password — Green Roots Smart</title>
<meta name="description" content="Reset your Green Roots Smart account password securely."/>
<meta name="robots" content="noindex, nofollow"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--g1:#1a4a24;--g2:#2d7a3a;--g3:#52b043;--g4:#a8d8a0;--g5:#e8f5e2;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#f0f4f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{background:white;border-radius:20px;padding:40px;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,0.1);}
.logo{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--g1);text-align:center;margin-bottom:24px;}
.logo span{color:var(--g3);}
.icon{font-size:48px;text-align:center;margin-bottom:16px;}
h2{font-family:'Playfair Display',serif;font-size:22px;color:var(--g1);text-align:center;margin-bottom:8px;}
p{font-size:13px;color:#7a9a74;text-align:center;margin-bottom:24px;line-height:1.6;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:700;color:#1a2e1a;margin-bottom:5px;text-transform:uppercase;}
.field input{width:100%;padding:11px 14px;border:1.5px solid #d4e8cc;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;}
.field input:focus{border-color:var(--g3);}
.btn{width:100%;padding:13px;background:linear-gradient(135deg,var(--g3),var(--g2));color:white;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;cursor:pointer;margin-top:6px;}
.alert{padding:12px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
.alert-error{background:#fce4ec;color:#c62828;}
.alert-success{background:#e8f5e2;color:#2d7a3a;}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Green Roots <span>Smart</span></div>
  <div class="icon">🔑</div>
  <h2>Set New Password</h2>
  <p>Enter your new password below</p>
  <div class="alert" id="alertMsg"></div>
  <div id="resetForm">
    <div class="field">
      <label>New Password *</label>
      <input type="password" id="newPass" placeholder="Enter new password (min 6 chars)"/>
    </div>
    <div class="field">
      <label>Confirm Password *</label>
      <input type="password" id="confirmPass" placeholder="Confirm new password"/>
    </div>
    <button class="btn" id="resetBtn" onclick="doReset()">Update Password 🌿</button>
  </div>
  <div id="successDiv" style="display:none;text-align:center;padding:20px 0;">
    <div style="font-size:48px;margin-bottom:12px;">🎉</div>
    <h3 style="color:#1a4a24;margin-bottom:8px;">Password Updated!</h3>
    <p style="margin-bottom:20px;">Your password has been reset successfully!</p>
    <a href="/login" style="display:inline-block;padding:12px 28px;background:#2d7a3a;color:white;border-radius:10px;text-decoration:none;font-weight:600;">Login Now →</a>
  </div>
</div>

<script>
const SURL = 'https://qrwhsygcblgbibogiecm.supabase.co';
const SKEY = 'sb_publishable_lBwSxrqJbAV4owK0nQfvXg_Bo2L0OKB';
const db = supabase.createClient(SURL, SKEY);

// Get token and email from URL
const params = new URLSearchParams(window.location.search);
const token = params.get('token');
const email = params.get('email');

if(!token || !email) {
  showAlert('Invalid reset link! Please request a new one.', 'error');
  document.getElementById('resetForm').style.display = 'none';
}

async function doReset() {
  const newPass = document.getElementById('newPass').value;
  const confirmPass = document.getElementById('confirmPass').value;

  if(!newPass || newPass.length < 6) { showAlert('Password must be at least 6 characters!', 'error'); return; }
  if(newPass !== confirmPass) { showAlert('Passwords do not match!', 'error'); return; }

  const btn = document.getElementById('resetBtn');
  btn.textContent = 'Updating...'; btn.disabled = true;

  try {
    // Verify token is valid and not expired
    const { data: resetData } = await db.from('password_resets')
      .select('*').eq('token', token).eq('email', email).eq('used', false).single();

    if(!resetData) { showAlert('Reset link expired or invalid! Please request a new one.', 'error'); btn.textContent = 'Update Password 🌿'; btn.disabled = false; return; }

    // Skip expiry check - 24 hour window is generous enough

    // Update password in suppliers table
    await db.from('suppliers').update({ password: newPass }).eq('email', email);

    // Also update in buyers table
    await db.from('buyers').update({ password: newPass }).eq('email', email);

    // Mark token as used
    await db.from('password_resets').update({ used: true }).eq('token', token);

    // Show success
    document.getElementById('resetForm').style.display = 'none';
    document.getElementById('successDiv').style.display = 'block';

  } catch(e) {
    showAlert('Something went wrong! Please try again.', 'error');
    btn.textContent = 'Update Password 🌿'; btn.disabled = false;
  }
}

function showAlert(msg, type) {
  const el = document.getElementById('alertMsg');
  el.className = 'alert alert-' + type;
  el.style.display = 'block';
  el.textContent = msg;
}
</script>
</body>
</html>
